<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN | PARTHSATTA CONTROL PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff3131; --gold: #ffd700; --bg: #000; --card: #111; --green: #25d366; --blue: #0088cc; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .hero { text-align: center; padding: 30px 10px; background: radial-gradient(circle, #300 0%, #000 100%); border-bottom: 2px solid var(--red); }
        .logo { font-size: 38px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 20px var(--red); margin: 0; color: #fff; }
        .sub-logo { color: var(--gold); font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        .live-label { color: var(--red); font-weight: 900; padding-left: 15px; margin-top: 20px; display: flex; align-items: center; }
        
        /* Market Grid */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .m-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; text-align: center; border-left: 4px solid var(--red); position: relative; }
        .m-name { color: var(--gold); font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .m-num { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--red); margin-bottom: 10px; }
        
        /* Update Inputs */
        .admin-input { width: 80%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .upd-btn { width: 100%; background: var(--red); color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 12px; transition: 0.3s; }
        .upd-btn:active { transform: scale(0.95); background: #b30000; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--red); }
    </style>
</head>
<body>

<div class="hero">
    <h1 class="logo">ADMIN PANEL</h1>
    <div class="sub-logo">PARTHSATTA REAL-TIME CONTROLLER</div>
</div>

<div class="live-label"><i class="fas fa-edit"></i> UPDATE MARKET NUMBERS</div>
<div class="market-grid" id="marketDisplay"></div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-lock"></i>ADMIN HOME</a>
    <a href="index.html" class="nav-item"><i class="fas fa-eye"></i>VIEW SITE</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBkeZInbo-rTkLPuZFdfyhr7oR03wy7_q8", projectId: "parthsatta", appId: "1:975713705925:web:fe0ff21f439e47f484b5ac" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const markets = ["Desawar", "Gali", "Faridabad", "Ghaziabad", "Shri Ganesh", "Delhi Bazar", "UP Bazar", "Kalyan", "Main Bazar", "Taj", "New Faridabad", "Old Delhi", "Satta Express", "Punjab Special", "Milan Day", "Time Bazar", "Rajdhani", "Taj Gold", "Gali Gold", "Dubai Bazar"];
    const grid = document.getElementById('marketDisplay');

    // UI Setup
    markets.forEach(m => {
        const mId = m.replace(/\s/g, '');
        grid.innerHTML += `
            <div class="m-card">
                <div class="m-name">${m}</div>
                <div class="m-num" id="${mId}">--</div>
                <input type="number" id="in-${mId}" class="admin-input" placeholder="00-99">
                <button class="upd-btn" onclick="updateNum('${mId}')">UPDATE</button>
            </div>`;
    });

    // Real-time Number Sync (Admin panel pe bhi dikhega current kya hai)
    db.collection("results").onSnapshot(snap => { 
        snap.forEach(doc => { 
            let el = document.getElementById(doc.id); 
            if(el) el.innerText = doc.data().num; 
        }); 
    });

    // Function to Update Number in Firebase
    async function updateNum(id) {
        const val = document.getElementById('in-' + id).value;
        if(val === "" || val.length > 2) return alert("Sahi number daalein (00-99)!");

        try {
            await db.collection("results").doc(id).set({ num: val }, { merge: true });
            alert("✅ Number Updated!");
            document.getElementById('in-' + id).value = ""; // Input clear
        } catch (e) {
            alert("Error! Firebase rules check karein.");
        }
    }
</script>
</body>
</html>
