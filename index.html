 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PARTHSATTA | ASIA'S NO.1 TRUSTED NETWORK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff3131; --gold: #ffd700; --bg: #000; --card: #111; --green: #25d366; --blue: #0088cc; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .hero { text-align: center; padding: 30px 10px; background: radial-gradient(circle, #300 0%, #000 100%); border-bottom: 2px solid var(--red); }
        .logo { font-size: 38px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 20px var(--red); margin: 0; color: #fff; }
        .sub-logo { color: var(--gold); font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        .giveaway { background: #1a0000; padding: 15px; border: 1px dashed var(--gold); margin: 15px; border-radius: 12px; text-align: center; }
        .giveaway h4 { color: var(--gold); margin: 0; font-size: 16px; animation: blink 1s infinite; }
        .win-ticker { font-size: 14px; color: #fff; margin-top: 8px; font-weight: 900; }
        .live-label { color: var(--red); font-weight: 900; padding-left: 15px; margin-top: 20px; display: flex; align-items: center; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .m-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 18px; text-align: center; border-left: 4px solid var(--red); position: relative; }
        .m-name { color: var(--gold); font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .m-num { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--red); }
        .m-status { color: #39ff14; font-size: 10px; font-weight: bold; }
        .booking-box { background: #0a0a0a; margin: 15px; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        .booking-box h3 { color: var(--red); text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-weight: bold; }
        .bet-btn { width: 100%; padding: 18px; background: var(--red); border: none; color: #fff; font-weight: 900; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .social-wrap { padding: 0 15px; }
        .social-btn { display: flex; align-items: center; justify-content: center; padding: 16px; border-radius: 12px; margin-bottom: 12px; text-decoration: none; font-weight: 900; color: #fff; font-size: 15px; border: 2px solid rgba(255,255,255,0.1); }
        .wa { background: var(--green); }
        .tg { background: var(--blue); }
        .gm { background: #333; }
        .archive { margin: 25px 15px; background: #0a0a0a; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .archive-header { background: var(--red); padding: 15px; text-align: center; font-weight: 900; font-size: 14px; letter-spacing: 1px; }
        .table-scroll { overflow-x: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th, td { border: 1px solid #222; padding: 14px; }
        th { background: #151515; color: var(--gold); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--red); }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="hero">
    <h1 class="logo">PARTHSATTA</h1>
    <div class="sub-logo">ASIA'S #1 TRUSTED BOOKING SYSTEM</div>
</div>

<div class="giveaway">
    <h4>🎁 DAILY JACKPOT WINNERS</h4>
    <div id="winnerName" class="win-ticker">Loading real winners...</div>
</div>

<div class="live-label"><i class="fas fa-bolt"></i> LIVE RESULTS (ALL MARKETS)</div>
<div class="market-grid" id="marketDisplay"></div>

<div class="booking-box">
    <h3>🏆 ONLINE BOOKING CENTER</h3>
    <input type="text" id="bName" placeholder="अपना नाम (Your Name)">
    <input type="number" id="bWA" placeholder="WhatsApp नंबर">
    <select id="bMarket"><option value="">मार्केट चुनें (Select Market)</option></select>
    <input type="number" id="bNum" placeholder="नumber चुनें (00-99)">
    <input type="number" id="bAmount" placeholder="कितने रुपये (Bet Amount)">
    <button class="bet-btn" onclick="sendBet()">CONFIRM BET (गेम लगाएं)</button>
</div>

<div class="social-wrap">
    <a href="https://chat.whatsapp.com/GoTo9l39vQz7gVA9rULQ6P" class="social-btn wa"><i class="fab fa-whatsapp"></i>&nbsp; JOIN WHATSAPP GROUP</a>
    <a href="https://t.me/parthsatta1" class="social-btn tg"><i class="fab fa-telegram-plane"></i>&nbsp; JOIN TELEGRAM CHANNEL</a>
    <a href="mailto:xvieweriloveu@gmail.com" class="social-btn gm"><i class="fas fa-envelope"></i>&nbsp; EMAIL SUPPORT</a>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i>HOME</a>
    <a href="https://chat.whatsapp.com/GoTo9l39vQz7gVA9rULQ6P" class="nav-item"><i class="fab fa-whatsapp"></i>WHATSAPP</a>
    <a href="https://t.me/parthsatta1" class="nav-item"><i class="fab fa-telegram"></i>TELEGRAM</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBkeZInbo-rTkLPuZFdfyhr7oR03wy7_q8", projectId: "parthsatta", appId: "1:975713705925:web:fe0ff21f439e47f484b5ac" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const markets = ["Desawar", "Gali", "Faridabad", "Ghaziabad", "Shri Ganesh", "Delhi Bazar", "UP Bazar", "Kalyan", "Main Bazar", "Taj", "New Faridabad", "Old Delhi", "Satta Express", "Punjab Special", "Milan Day", "Time Bazar", "Rajdhani", "Taj Gold", "Gali Gold", "Dubai Bazar"];
    const grid = document.getElementById('marketDisplay');
    const select = document.getElementById('bMarket');

    markets.forEach(m => {
        grid.innerHTML += `<div class="m-card"><div class="m-name">${m}</div><div class="m-num" id="${m.replace(/\s/g, '')}">--</div><div class="m-status">● LIVE</div></div>`;
        select.innerHTML += `<option value="${m}">${m}</option>`;
    });

    db.collection("results").onSnapshot(snap => { 
        snap.forEach(doc => { 
            let el = document.getElementById(doc.id); 
            if(el) el.innerText = doc.data().num; 
        }); 
    });

    async function sendBet() {
        const d = { name: document.getElementById('bName').value, wa: document.getElementById('bWA').value, market: document.getElementById('bMarket').value, num: document.getElementById('bNum').value, amount: document.getElementById('bAmount').value, time: new Date() };
        if(!d.name || !d.amount) return alert("Puri jankari bharein!");
        await db.collection("bets").add(d);
        window.location.href = `https://wa.me/918979382308?text=*NEW BET*%0AName: ${d.name}%0AMarket: ${d.market}%0ANumber: ${d.num}%0AAmount: ${d.amount}`;
    }
</script>
</body>
</html>
